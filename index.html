<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Test for you ! 😉</title>
 <link rel="stylesheet" href="./styles/index.css">
 
 <!-- fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
 <main>

    <center>

   </div>
   <div class="walking">
    <!-- walking animation -->
    <center>
    <p>Wait...</p>
    <img src="./assets/bears/bag-carrying.webp">
    </center>
   </div>
  </div>
 </main>
 <div class="indexBackground">
  <!-- background-image -->
 </div>
 
 <div class="overlay">
  <!-- blue overlays often use -->
  <h1>Hey,<br>My bestfriend...🫂</h1>
   <canvas></canvas>
 </div>
 <audio controls loop>
  <source src="./assets/Happy Birthday (Background Score).mp3" type="audio/mp3">
 </audio>

 <script type="module" src="./scripts/index.js"></script>
</body>

</html>
